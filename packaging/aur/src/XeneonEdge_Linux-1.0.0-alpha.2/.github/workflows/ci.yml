name: CI

# v1.0-alpha is a long-lived release track (epics E4-E9 land there before master).
# Without it here the whole alpha branch went unverified for 8 commits and a real
# break — smoke tests vs the XENEON_QA_HOOKS guard — only surfaced when it merged.
on:
  push:
    branches: [main, master, v1.0-alpha]
  pull_request:
    branches: [main, master, v1.0-alpha]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Rust Core ---
  format:
    name: Rust Format Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    name: Rust Clippy
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Rust Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  # --- Full Build ---
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Ubuntu 24.04's apt Qt is 6.4.2, but the project requires Qt >= 6.5
      # (QtQuick.Effects/MultiEffect) and needs QML modules the minimal apt
      # packages omit (QtQml.WorkerScript). Install a full Qt >= 6.5 instead.
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev
      - name: Build Rust core
        run: cargo build --release
        working-directory: core
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build C++ application
        run: cmake --build build -j$(nproc)
      - name: Verify binary
        run: test -f build/xeneon-edge-hub || echo "Binary not found, check build logs"

  docs:
    name: Docs & Links
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        continue-on-error: true
        with:
          use-quiet-mode: 'yes'

  # --- QML behavior matrix ---
  qml-test:
    name: QML Tests + Behavior Matrix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Full Qt >= 6.5: the apt qt6-declarative is 6.4.2 and lacks bundled QML
      # modules (QtQml.WorkerScript, QtQuick.Effects) the widgets need.
      - name: Install Qt 6.7 (+ qmltestrunner)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install runtime libs + fonts
        # A real scalable font is required: several tests assert text metrics
        # (Text.fontSizeMode fit, paintedWidth <= tile), which have no meaningful
        # value under the offscreen platform with no font installed.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon0 libgl1 fonts-dejavu-core fontconfig
          sudo fc-cache -f
      - name: Run QML GUI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./scripts/run_ui_tests.sh
      - name: Enforce QML behavior-matrix coverage (>= 95%)
        run: python3 scripts/qml_coverage.py | tee coverage-qml.txt
      # The two structural lints. They lived only in run_all_tests.sh, i.e. they
      # gated nothing anyone was forced to run — and the egress lint is the whole
      # basis of the "no telemetry" claim, so it has to hold on every push, not
      # just when a dev remembers. Both are plain bash with no deps.
      - name: Egress lint (no raw XHR outside the NetHub gate)
        run: bash scripts/check_no_raw_xhr.sh
      - name: Icon lint (every widget type has a bundled, registered icon)
        run: bash scripts/check_widget_icons.sh
      - name: Upload uncovered-behavior list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-behavior-coverage
          path: coverage-qml.txt

  # --- C++ tests + coverage capture ---
  cpp-test:
    name: C++ Tests + Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install build + coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev
          # Use a modern gcovr (via pipx, preinstalled on the runner): the apt
          # gcovr does not honor the in-source GCOVR_EXCL_START/STOP hardware/glue
          # exclusion markers, so it counts the excluded lines and understates
          # coverage. pipx gcovr matches the version used locally.
          pipx install gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build Rust core (static lib for C++ tests)
        run: cargo build --release
        working-directory: core
      - name: Configure CMake (tests + coverage)
        # XENEON_QA_HOOKS=ON is required by the smoke tests, which drive the real
        # binaries via XENEON_GRAB. It defaults to OFF so product builds ignore
        # the hook; the "Build" job above covers that default/product config.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DXENEON_BUILD_TESTS=ON -DXENEON_COVERAGE=ON -DXENEON_QA_HOOKS=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run C++ tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
      - name: Capture C++ coverage (lcov)
        run: |
          mkdir -p coverage
          gcovr --root . \
            --filter 'app/src/' --filter 'manager/src/' \
            --exclude '.*main\.cpp' \
            --lcov coverage/cpp-lcov.info \
            build
      - name: Upload C++ lcov
        uses: actions/upload-artifact@v4
        with:
          name: cpp-lcov
          path: coverage/cpp-lcov.info

  # --- Rust + C++ merged coverage gate ---
  coverage:
    name: Coverage Gate (Rust + C++ >= 95%)
    runs-on: ubuntu-24.04
    needs: [test, cpp-test]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov + lcov + gcovr
        run: |
          cargo install cargo-llvm-cov --locked
          sudo apt-get update
          sudo apt-get install -y lcov gcovr
      - name: Rust coverage (lcov + JSON summary)
        working-directory: core
        run: |
          mkdir -p ../coverage
          cargo llvm-cov --lib --lcov --output-path ../coverage/rust-lcov.info
          cargo llvm-cov --lib --json --summary-only --output-path ../coverage/rust-summary.json
      - name: Enforce Rust >= 95%
        run: |
          pct=$(python3 -c 'import json; print(json.load(open("coverage/rust-summary.json"))["data"][0]["totals"]["lines"]["percent"])')
          echo "Rust line coverage: ${pct}%"
          python3 -c "import sys; sys.exit(0 if float('${pct}') >= 95 else 1)"
      - name: Download C++ lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: cpp-lcov
          path: coverage
      - name: Merge Rust + C++ lcov
        run: |
          lcov --add-tracefile coverage/rust-lcov.info \
               --add-tracefile coverage/cpp-lcov.info \
               --output-file coverage/merged-lcov.info
      - name: Enforce merged (Rust + C++) >= 95%
        run: |
          pct=$(python3 - <<'PY'
          total = hit = 0
          for line in open("coverage/merged-lcov.info"):
              if line.startswith("DA:"):
                  p = line[3:].strip().split(",")
                  if len(p) >= 2:
                      total += 1
                      if int(p[1]) > 0:
                          hit += 1
          print("%.2f" % (100.0 * hit / total if total else 100.0))
          PY
          )
          echo "Merged (Rust + C++) line coverage: ${pct}%"
          python3 -c "import sys; sys.exit(0 if float('${pct}') >= 95 else 1)"
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
