# Flatpak manifest for the Xeneon Edge Linux Hub.
#
# STATUS: starter manifest — NOT yet build-tested (no flatpak-builder in the dev
# container). See packaging/flatpak/README.md for the open items (Rust cargo
# vendoring, /sys sensor access, cross-sandbox Manager<->hub IPC) that must be
# resolved before a Flathub submission.
#
# Uses the KDE runtime (ships Qt 6). Adjust runtime-version to a currently
# supported KDE runtime, and match the rust-stable SDK extension accordingly.
app-id: com.skyphoenix_it.XeneonEdgeHub
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: xeneon-edge-hub

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=session-bus            # discover + control MPRIS media players
  - --device=dri                    # GPU / rendering
  - --device=all                    # hidraw orientation sensor (tighten if possible)
  - --talk-name=org.mpris.MediaPlayer2.*
  # Live system metrics read /proc and parts of /sys (temps, GPU). /proc is
  # available in the sandbox; some /sys paths are not — metrics degrade gracefully.

modules:
  - name: xeneon-edge-hub
    buildsystem: cmake-ninja
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/xeneon-edge-hub/cargo
      # For a local `flatpak-builder --user` test build you can add network access
      # so cargo can fetch crates:  build-args: ['--share=network']
      # Flathub requires offline builds — generate cargo-sources.json instead
      # (see README.md) and add it to `sources` below.
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/skyphoenix-it/XeneonEdge_Linux.git
        tag: v0.1.0
      # - cargo-sources.json      # generated; required for offline (Flathub) builds
