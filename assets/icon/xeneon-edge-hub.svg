<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2230"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#79C0FF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#7EE787"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A371F7"/>
      <stop offset="1" stop-color="#D2A8FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.62">
      <stop offset="0" stop-color="#58A6FF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12161F"/>
      <stop offset="1" stop-color="#0C0F16"/>
    </linearGradient>
  </defs>

  <!-- App tile background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#glow)"/>

  <!-- The Edge: a tall portrait touchscreen -->
  <g>
    <rect x="176" y="60" width="160" height="392" rx="30" fill="url(#screen)"
          stroke="#2C3444" stroke-width="3"/>
    <!-- top accent hairline (the signature glow bar) -->
    <rect x="198" y="82" width="116" height="5" rx="2.5" fill="url(#accent)" opacity="0.85"/>

    <!-- ring gauge widget -->
    <circle cx="256" cy="170" r="47" fill="none" stroke="#20262F" stroke-width="13"/>
    <path d="M 256 123 A 47 47 0 1 1 214.5 197.4" fill="none" stroke="url(#accent)"
          stroke-width="13" stroke-linecap="round"/>

    <!-- two metric bars -->
    <rect x="200" y="258" width="112" height="12" rx="6" fill="#20262F"/>
    <rect x="200" y="258" width="78"  height="12" rx="6" fill="url(#green)"/>
    <rect x="200" y="286" width="112" height="12" rx="6" fill="#20262F"/>
    <rect x="200" y="286" width="52"  height="12" rx="6" fill="url(#purple)"/>

    <!-- a small tile -->
    <rect x="200" y="320" width="112" height="60" rx="12" fill="#161B22" stroke="#242C39" stroke-width="2"/>
    <circle cx="224" cy="350" r="11" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <rect x="246" y="342" width="52" height="6" rx="3" fill="#3A4453"/>
    <rect x="246" y="354" width="34" height="6" rx="3" fill="#2C3442"/>

    <!-- page indicator dots -->
    <rect x="236" y="410" width="18" height="7" rx="3.5" fill="url(#accent)"/>
    <circle cx="266" cy="413.5" r="3.5" fill="#3A4453"/>
    <circle cx="282" cy="413.5" r="3.5" fill="#3A4453"/>
  </g>
</svg>
