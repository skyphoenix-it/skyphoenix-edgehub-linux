name: Docs

# Runs ONLY when documentation changes — the one CI concern docs edits have.
# Everything else deliberately ignores docs (see ci.yml paths-ignore).
on:
  push:
    branches: [main, master, 'v1.0-alpha']
    paths: ['docs/**', '**.md']
  pull_request:
    branches: [main, master, 'v1.0-alpha']
    paths: ['docs/**', '**.md']
  workflow_dispatch:

jobs:
  links:
    name: Docs & Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The check moved into scripts/check_doc_links.sh so it can be run locally
      # (and from run_all_tests.sh) instead of only ever failing after a push —
      # which is how it sat red on master while nobody could reproduce it.
      - name: Check relative links and anchors resolve
        run: bash scripts/check_doc_links.sh
