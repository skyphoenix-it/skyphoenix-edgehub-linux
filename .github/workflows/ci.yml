name: CI

# master AND v1.0-alpha.
#
# This previously triggered on master only, on the stated precondition that
# v1.0-alpha was kept in ff-only lockstep with master (same SHA), making a second
# run pure quota burn. That precondition is VOID: on 2026-07-20 v1.0-alpha was
# measured 86 commits ahead of master, and 31 of the last 62 fixes — 28 of them
# user-visible — had received zero CI runs. A real break hid there once before
# for 8 commits; this time thirteen defects were fixed between two and five times
# each, all inside the un-gated window.
#
# Do NOT restore the master-only optimization without first restoring the
# lockstep it depends on. If the double-run cost matters, merge alpha into master
# rather than narrowing the trigger. See docs/agent-memory/TEST-STRATEGY-v2.md.
on:
  push:
    branches: [main, master, 'v1.0-alpha']
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE*'
  pull_request:
    branches: [main, master, 'v1.0-alpha']
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Rust Core ---
  # One job, one toolchain setup: fmt + clippy(--all-targets) + test previously ran
  # as THREE jobs — three checkouts and toolchain installs wrapping ~90s of real
  # work. Sequential; a failure still names its step. Security Audit moved to the
  # scheduled supply-chain workflow (an advisory feed does not change per push);
  # Docs & Links moved to docs.yml (runs only when docs change).
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        working-directory: core
        run: cargo fmt --check
      - name: Clippy (--all-targets — --lib misses test-code lints)
        working-directory: core
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        working-directory: core
        run: cargo test
      # The licence issuer tool (not shipped) mints the keys that unlock paid
      # features, so its crypto correctness — a minted key verifies, a forged
      # payload does not, a name can't inject a higher tier — is gated too. Folded
      # into this existing job (no new job) to keep the Actions budget flat.
      - name: Licence tool (fmt + clippy + test)
        working-directory: tools/license-tool
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Ubuntu 24.04's apt Qt is 6.4.2, but the project requires Qt >= 6.5
      # (QtQuick.Effects/MultiEffect) and needs QML modules the minimal apt
      # packages omit (QtQml.WorkerScript). Install a full Qt >= 6.5 instead.
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev
      - name: Build Rust core
        run: cargo build --release
        working-directory: core
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build C++ application
        run: cmake --build build -j$(nproc)
      - name: Verify binary
        run: test -f build/xeneon-edge-hub || echo "Binary not found, check build logs"

  qml-test:
    name: QML Tests + Behavior Matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # Full Qt >= 6.5: the apt qt6-declarative is 6.4.2 and lacks bundled QML
      # modules (QtQml.WorkerScript, QtQuick.Effects) the widgets need.
      - name: Install Qt 6.7 (+ qmltestrunner)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install runtime libs + fonts
        # A real scalable font is required: several tests assert text metrics
        # (Text.fontSizeMode fit, paintedWidth <= tile), which have no meaningful
        # value under the offscreen platform with no font installed.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon0 libgl1 fonts-dejavu-core fontconfig
          sudo fc-cache -f
      - name: Run QML GUI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./scripts/run_ui_tests.sh
      - name: Enforce QML behavior-matrix coverage (>= 95%)
        run: python3 scripts/qml_coverage.py | tee coverage-qml.txt
      # The two structural lints. They lived only in run_all_tests.sh, i.e. they
      # gated nothing anyone was forced to run — and the egress lint is the whole
      # basis of the "no telemetry" claim, so it has to hold on every push, not
      # just when a dev remembers. Both are plain bash with no deps.
      - name: Egress lint (no raw XHR outside the NetHub gate)
        run: bash scripts/check_no_raw_xhr.sh
      - name: Enforce that every test actually runs (QtTest '_data' trap)
        run: bash scripts/check_live_tests.sh
      - name: Enforce that UI links go somewhere
        run: bash scripts/check_ui_links.sh
      - name: Icon lint (every widget type has a bundled, registered icon)
        run: bash scripts/check_widget_icons.sh
      # Guards the scene-graph walk bug that OOMed the developer's machine
      # (18.8 GB / 20 GB RSS, three independent copies). It lived only in
      # run_all_tests.sh — i.e. it gated nothing anyone was forced to run.
      - name: Tree-walk memory guard (the 18.8 GB OOM class)
        run: python3 scripts/check_tree_walks.py
      # Cross-file zsync delta-update invariants. Every one of the four files it
      # spans was independently broken while the rest of the suite stayed green.
      - name: AppImage update contract
        run: bash scripts/check_appimage_update_contract.sh
      - name: Upload uncovered-behavior list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-behavior-coverage
          path: coverage-qml.txt

  # --- C++ tests + coverage capture ---
  cpp-test:
    name: C++ Tests + Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install build + coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev
          # Use a modern gcovr (via pipx, preinstalled on the runner): the apt
          # gcovr does not honor the in-source GCOVR_EXCL_START/STOP hardware/glue
          # exclusion markers, so it counts the excluded lines and understates
          # coverage. pipx gcovr matches the version used locally.
          pipx install gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build Rust core (static lib for C++ tests)
        run: cargo build --release
        working-directory: core
      - name: Configure CMake (tests + coverage)
        # XENEON_QA_HOOKS=ON is required by the smoke tests, which drive the real
        # binaries via XENEON_GRAB. It defaults to OFF so product builds ignore
        # the hook; the "Build" job above covers that default/product config.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DXENEON_BUILD_TESTS=ON -DXENEON_COVERAGE=ON -DXENEON_QA_HOOKS=ON
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run C++ tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
      # Nine scenarios driving the REAL hub binary and asserting the persisted
      # config.toml. This tier existed only in run_all_tests.sh and ran in no
      # workflow. Exit 77 = SKIP (no binary), which the script reports honestly.
      - name: Runtime E2E battery (real hub binary)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          rc=0
          for f in tests/runtime/run_*.sh; do
            echo "==> $f"
            bash "$f" || { c=$?; [ "$c" = 77 ] && echo "   SKIP (no binary)" || { echo "   FAIL ($c)"; rc=1; }; }
          done
          exit $rc
      - name: Capture C++ coverage (lcov)
        run: |
          mkdir -p coverage
          gcovr --root . \
            --filter 'app/src/' --filter 'manager/src/' \
            --exclude '.*main\.cpp' \
            --lcov coverage/cpp-lcov.info \
            build
      - name: Upload C++ lcov
        uses: actions/upload-artifact@v4
        with:
          name: cpp-lcov
          path: coverage/cpp-lcov.info

  # --- Rust + C++ merged coverage gate ---
  coverage:
    name: Coverage Gate (Rust + C++ >= 95%)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [rust, cpp-test]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov + lcov + gcovr
        run: |
          cargo install cargo-llvm-cov --locked
          sudo apt-get update
          sudo apt-get install -y lcov gcovr
      - name: Rust coverage (lcov + JSON summary)
        working-directory: core
        run: |
          mkdir -p ../coverage
          cargo llvm-cov --lib --lcov --output-path ../coverage/rust-lcov.info
          cargo llvm-cov --lib --json --summary-only --output-path ../coverage/rust-summary.json
      - name: Enforce Rust >= 95%
        run: |
          pct=$(python3 -c 'import json; print(json.load(open("coverage/rust-summary.json"))["data"][0]["totals"]["lines"]["percent"])')
          echo "Rust line coverage: ${pct}%"
          python3 -c "import sys; sys.exit(0 if float('${pct}') >= 95 else 1)"
      - name: Download C++ lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: cpp-lcov
          path: coverage
      - name: Merge Rust + C++ lcov
        run: |
          lcov --add-tracefile coverage/rust-lcov.info \
               --add-tracefile coverage/cpp-lcov.info \
               --output-file coverage/merged-lcov.info
      - name: Enforce merged (Rust + C++) >= 95%
        run: |
          pct=$(python3 - <<'PY'
          total = hit = 0
          for line in open("coverage/merged-lcov.info"):
              if line.startswith("DA:"):
                  p = line[3:].strip().split(",")
                  if len(p) >= 2:
                      total += 1
                      if int(p[1]) > 0:
                          hit += 1
          print("%.2f" % (100.0 * hit / total if total else 100.0))
          PY
          )
          echo "Merged (Rust + C++) line coverage: ${pct}%"
          python3 -c "import sys; sys.exit(0 if float('${pct}') >= 95 else 1)"
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # --- QML compositor suite (tests/gui) — NON-BLOCKING ---
  # 20 files, 739 test functions, 2137 assertions under a real kwin_wayland at
  # 2560x720 with real input and real pixels. It holds the ONLY aspect-ratio
  # assertions in the repo, and until 2026-07-20 it was orphaned (referenced by
  # no script or workflow) AND structurally unable to fail (it ended in an
  # `echo`, so it printed RESULT: FAILURE and exited 0).
  #
  # continue-on-error is DELIBERATE and TEMPORARY: the suite carries ~210 known
  # failures, and a permanently-red required gate is exactly how a suite gets
  # ignored — the disease this whole effort is treating. Phase 1 of
  # docs/agent-memory/TEST-STRATEGY-v2.md drives it green.
  #
  # >>> REMOVE continue-on-error AT THE END OF PHASE 1. <<<
  #
  # Viability on a hosted runner is UNPROVEN — the suite was written for a real
  # desktop session. If nested KWin does not come up here, the honest outcome is
  # to keep this tier on the local/hardware runs rather than fake it in CI.
  gui-test:
    name: QML Compositor Suite (non-blocking, known-red)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt 6.7 (+ qmltestrunner)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install compositor + runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y kwin-wayland xwayland libxkbcommon0 libgl1 \
            fonts-dejavu-core fontconfig ffmpeg
          sudo fc-cache -f
      - name: Run compositor suite
        run: bash tests/gui/run_gui_tests.sh
      - name: Upload GUI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-evidence
          path: gui-evidence/
          if-no-files-found: ignore
