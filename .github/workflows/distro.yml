name: Distro Packages

# Builds against each distro's OWN Qt6 packages — deliberately NOT the
# jurplel/install-qt-action Qt used by ci.yml. ci.yml answers "does the code
# compile against upstream Qt 6.7"; this answers "can a Fedora/Ubuntu user
# actually install and run it", which is a different question and the one that
# broke: the .deb installed fine and then died at startup on a missing QML module.
#
# GitHub runners are Ubuntu-only, so each distro runs in a container.
# Every job is two stages on purpose:
#   build   — install -devel packages, compile, cpack
#   install — a CLEAN container that installs ONLY the artifact
# The clean stage is the point. Installing in the build container proves nothing:
# the -devel packages already dragged in the whole Qt runtime, so a package with
# missing Requires/Depends would still "work" there.

on:
  push:
    branches: [master]
    paths:
      - 'packaging/**'
      - 'CMakeLists.txt'
      - '.github/workflows/distro.yml'
  schedule:
    - cron: '17 5 * * 1'   # weekly drift check (Mon 05:17 UTC)
  # Before tagging a release: run this manually (workflow_dispatch) — a release
  # must never ship an unproven matrix, and scripts/release.sh's checklist says so.
  workflow_dispatch:

jobs:
  fedora:
    name: Fedora ${{ matrix.release }} (RPM)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        release: ['43']
    container: fedora:${{ matrix.release }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install \
            git cmake gcc-c++ make rpm-build cargo rust \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtsvg-devel \
            qt6-qtvirtualkeyboard-devel qt6-qtwayland-devel \
            mesa-libGL-devel

      - name: Record + gate Qt version (>= 6.5)
        # find_package(Qt6 6.5) would catch this at configure time anyway, but a
        # named step makes a distro Qt regression obvious in the job list.
        run: |
          rpm -q qt6-qtbase-devel qt6-qtdeclarative-devel
          v=$(rpm -q --qf '%{VERSION}' qt6-qtbase-devel)
          echo "Fedora Qt: $v"
          [ "$(printf '6.5\n%s\n' "$v" | sort -V | head -1)" = "6.5" ] || {
            echo "Qt $v < 6.5 (QtQuick.Effects unavailable)"; exit 1; }

      - name: Build Rust core
        run: cargo build --release
        working-directory: core

      - name: Configure + build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

      - name: Package (RPM)
        run: cpack -G RPM
        working-directory: build

      - uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ matrix.release }}-rpm
          path: build/*.rpm

  fedora-install:
    name: Fedora ${{ matrix.release }} install + smoke (clean)
    needs: fedora
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        release: ['43']
    container: fedora:${{ matrix.release }}
    steps:
      # actions/checkout needs git present in the container image.
      - run: dnf -y install git
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: fedora-${{ matrix.release }}-rpm
          path: pkg

      - name: Install the RPM with no Qt preinstalled
        # Resolves Requires from the repos only — this is what proves the
        # declared dependency list is complete and installable.
        run: dnf -y install ./pkg/*.rpm

      - name: Launch smoke (offscreen)
        run: |
          dnf -y install dejavu-sans-fonts fontconfig
          bash packaging/ci/smoke.sh

      - name: Validate AppStream + desktop entries
        run: |
          dnf -y install appstream desktop-file-utils
          for f in /usr/share/metainfo/com.skyphoenix_it.*.xml; do
            appstreamcli validate --no-net "$f"
          done
          desktop-file-validate /usr/share/applications/xeneon-edge-hub.desktop
          desktop-file-validate /usr/share/applications/xeneon-edge-manager.desktop

  appimage:
    name: AppImage (Qt 6.7 bundled)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # NOT optional, and not a caching nicety. build-appimage.sh names the
          # artifact — and stamps the binary's appVersion() — from `git describe
          # --tags`. checkout's default fetch-depth: 1 fetches NO tags, and
          # `--always` then degrades to a bare commit sha rather than failing.
          # UpdateChecker.qml cannot SemVer-order a sha against a release tag, so
          # it reports "no comparable version" and never surfaces an update — in
          # the one install kind that is actually pointed at the .zsync path.
          # Guarded by scripts/check_appimage_update_contract.sh.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable

      # Deliberately NOT 24.04's apt Qt (6.4.2 — too old for QtQuick.Effects).
      # Upstream Qt 6.7 on 24.04's old glibc is exactly what an AppImage wants:
      # a modern Qt with the lowest practical glibc floor. Building on a newer
      # distro would raise that floor and defeat the format.
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          modules: 'qtvirtualkeyboard'
          cache: true

      - name: Install build + deploy dependencies
        # linuxdeploy resolves every NEEDED entry of every ELF it bundles, so the
        # xcb/wayland/fontconfig runtime libs must exist on the BUILD host even
        # though they are excluded from the final AppImage. Missing any one of
        # them aborts the qt plugin (e.g. "Could not find dependency:
        # libxcb-icccm.so.4").
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make file curl patchelf desktop-file-utils \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev libdbus-1-dev \
            libfontconfig1-dev libfreetype-dev libx11-dev libxcb1-dev \
            libxcb-cursor-dev libglib2.0-dev libwayland-dev \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-render0 libxcb-shape0 libxcb-shm0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 libxcb-glx0 libxcb-util1 \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libsm6 libice6 \
            libegl1 libopengl0

      - name: Build AppImage
        run: ./packaging/appimage/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: '*.AppImage'

  appimage-smoke:
    name: AppImage smoke (bare container, no Qt)
    needs: appimage
    runs-on: ubuntu-24.04
    # The whole promise of an AppImage is running where nothing is installed, so
    # smoking it on the build runner (which has a full Qt) would prove nothing at
    # all. This container has no Qt and no Rust — only the graphics/font stack
    # that linuxdeploy intentionally excludes and every real desktop provides.
    container: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - run: apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: pkg

      - name: Install the host graphics/font stack (NOT Qt)
        # linuxdeploy excludes libGL/libEGL/libfontconfig on purpose: a bundled
        # libGL breaks on hosts with a different (e.g. NVIDIA) driver, so GL must
        # come from the host. Fonts likewise. Nothing here is Qt.
        run: |
          apt-get install -y --no-install-recommends \
            libgl1 libglx-mesa0 libopengl0 libegl1 libfontconfig1 fonts-dejavu-core

      - name: Assert the container really has no Qt
        run: |
          if ls /usr/lib/*/libQt6Core.so* >/dev/null 2>&1; then
            echo "FAIL: this container has a system Qt — the smoke would be meaningless"; exit 1
          fi
          echo "confirmed: no system Qt present"

      - name: Smoke the AppImage (offscreen)
        run: bash packaging/ci/smoke-appimage.sh pkg/*.AppImage "$(pwd)"

      - name: Negative control — smoke must FAIL if a QML module is missing
        # A smoke test that cannot fail proves nothing. Deleting QtQuick.Effects
        # still yields a clean 10s launch (main.qml never imports it; it is
        # reached through a lazily-loaded widget), so this also proves the module
        # check — not just the launch — is what catches a mis-bundled AppImage.
        run: |
          cd /tmp
          cp "$GITHUB_WORKSPACE"/pkg/*.AppImage ./neg.AppImage
          chmod +x ./neg.AppImage
          ./neg.AppImage --appimage-extract >/dev/null
          rm -rf /tmp/squashfs-root/usr/qml/QtQuick/Effects
          mkdir -p /tmp/negbin
          printf '#!/bin/sh\nexec /tmp/squashfs-root/AppRun "$@"\n' > /tmp/negbin/xeneon-edge-hub
          chmod +x /tmp/negbin/xeneon-edge-hub
          export PATH="/tmp/negbin:$PATH"
          export QML_DIR=/tmp/squashfs-root/usr/qml
          export SRC_ROOT="$GITHUB_WORKSPACE"
          export LC_ALL=C.UTF-8
          if bash "$GITHUB_WORKSPACE/packaging/ci/smoke.sh" > /tmp/neg.log 2>&1; then
            echo "FAIL: smoke PASSED with QtQuick.Effects deleted — the check is not working"
            cat /tmp/neg.log; exit 1
          fi
          grep -q 'MISSING: QtQuick.Effects' /tmp/neg.log || {
            echo "FAIL: smoke failed for the wrong reason"; cat /tmp/neg.log; exit 1; }
          echo "negative control OK: smoke correctly failed on the missing module"

  ubuntu:
    name: Ubuntu ${{ matrix.release }} (DEB)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        release: ['26.04']
    container: ubuntu:${{ matrix.release }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        # ca-certificates is not optional: without it cargo's crates.io fetch
        # fails on the bare image with "[77] Problem with the SSL CA cert".
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates git cmake g++ make file dpkg-dev rustc cargo \
            qt6-base-dev qt6-declarative-dev qt6-svg-dev qt6-virtualkeyboard-dev \
            libgl1-mesa-dev

      - name: Record + gate Qt version (>= 6.5)
        run: |
          dpkg -l qt6-base-dev qt6-declarative-dev | grep ^ii
          v=$(qmake6 -query QT_VERSION)
          echo "Ubuntu Qt: $v"
          [ "$(printf '6.5\n%s\n' "$v" | sort -V | head -1)" = "6.5" ] || {
            echo "Qt $v < 6.5 (QtQuick.Effects unavailable)"; exit 1; }

      - name: Build Rust core
        run: cargo build --release
        working-directory: core

      - name: Configure + build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"

      - name: Package (DEB)
        run: cpack -G DEB
        working-directory: build

      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.release }}-deb
          path: build/*.deb

  ubuntu-install:
    name: Ubuntu ${{ matrix.release }} install + smoke (clean)
    needs: ubuntu
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        release: ['26.04']
    container: ubuntu:${{ matrix.release }}
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # actions/checkout needs git present in the container image.
      - run: apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ubuntu-${{ matrix.release }}-deb
          path: pkg

      - name: Install the DEB with no Qt preinstalled
        # The regression guard for the qml6-module-* Depends in CMakeLists.txt:
        # dpkg-shlibdeps cannot see dlopen'd QML plugins, so if that list is ever
        # trimmed this step still passes and the smoke step below fails.
        run: |
          apt-get update -qq
          apt-get install -y ./pkg/*.deb

      - name: Launch smoke (offscreen)
        run: |
          apt-get install -y --no-install-recommends fonts-dejavu-core fontconfig
          bash packaging/ci/smoke.sh

      - name: Validate AppStream + desktop entries
        run: |
          apt-get install -y --no-install-recommends appstream desktop-file-utils
          for f in /usr/share/metainfo/com.skyphoenix_it.*.xml; do
            appstreamcli validate --no-net "$f"
          done
          desktop-file-validate /usr/share/applications/xeneon-edge-hub.desktop
          desktop-file-validate /usr/share/applications/xeneon-edge-manager.desktop
