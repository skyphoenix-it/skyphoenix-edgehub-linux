# cargo-deny — supply-chain policy for the Rust core (E9).
#
# Complements `cargo audit`, which only reads Cargo.lock and knows nothing about
# licenses, duplicate crates, or where a crate came from. Note the trap that has
# bitten this repo before: audit/deny both reason about the LOCKFILE, not the
# enabled feature set, so a crate reported here may not be compiled into the
# shipped artifact. Verify before treating a finding as unreachable — the
# lockfile is the honest worst case.
#
# Policy: no blanket allows. An advisory or a copyleft dependency is a FINDING to
# resolve or consciously accept with a written reason and an expiry, never a line
# that silently makes the check green.

[graph]
# The hub ships for Linux only; pulling Windows/macOS-gated crates into the graph
# would report advisories against code that is never built or distributed.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
# Empty and intended to stay that way: an ignored advisory is an accepted risk,
# and it belongs here only with a rationale and a re-review date.
ignore = []

[licenses]
version = 2
# Exactly the licenses currently resolved in the graph — nothing speculative.
# A new dependency under any other license (BSD, ISC, Zlib, …) is meant to FAIL
# here: that failure is the license review, and waving it through in advance
# would skip the one decision this file exists to force. Every entry below is
# redistributable in a proprietary/enterprise deployment without imposing
# source-disclosure obligations on the customer.
#
# MPL-2.0 is here for exactly one crate — option-ext 0.2.0, pulled in
# transitively by `dirs` (dirs -> dirs-sys -> option-ext). MPL-2.0 is FILE-level
# copyleft: linking it into a proprietary binary is fine, and the obligation only
# attaches if we modify option-ext's own source, which we do not. It is called
# out in docs/security/supply-chain.md so a customer audit finds it explained
# rather than as a surprise.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

# OPEN FINDING, not a workaround: core/Cargo.toml declares no `license` field, so
# cargo-deny correctly reports our OWN crate as `unlicensed`. The repo ships
# LICENSE-MIT + LICENSE-APACHE and the README states the dual license, so the
# manifest is simply out of step with the project.
#
# This clarify states the licence the project already grants — it is a true
# statement about xeneon-core, and it allows no third-party license whatsoever.
# The actual fix is one line in core/Cargo.toml:
#     license = "MIT OR Apache-2.0"
# and once that lands this block should be DELETED. core/Cargo.toml is owned by
# another workstream right now; tracked in docs/security/supply-chain.md.
[[licenses.clarify]]
name = "xeneon-core"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# A build script or proc macro runs on the developer's and CI machine at BUILD
# time, so a malicious one is a supply-chain compromise regardless of what the
# shipped binary does. Nothing in the tree needs these.
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# crates.io only. A git dependency has no immutable version and no audit trail —
# if one ever appears here it must be justified explicitly.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
